<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Farbpunkte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; }

body {
  width: 100dvw;
  height: 100dvh;
  display: grid;
  grid-template-columns: clamp(90px, 16vw, 130px) 1fr clamp(90px, 16vw, 130px);
  grid-template-rows: clamp(90px, 16vh, 130px) 1fr clamp(90px, 16vh, 130px);
  gap: 10px;
  padding: 10px;
  background:
    radial-gradient(ellipse at 20% 20%, #1a1a3e 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, #2d1b4e 0%, transparent 50%),
    #0d0d1f;
  overflow: hidden;
  font-family: 'Nunito', 'Segoe UI', Helvetica, Arial, sans-serif;
  touch-action: none;
  user-select: none;
}

body.screen-shake { animation: screenShake 0.35s ease-out; }
@keyframes screenShake {
  0%,100% { transform: translate(0,0); }
  20% { transform: translate(-8px, 4px); }
  40% { transform: translate(7px, -5px); }
  60% { transform: translate(-5px, -3px); }
  80% { transform: translate(4px, 3px); }
}

/* ── Player zones ── */
.zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  gap: 8px;
  border-radius: 22px;
  transition: filter 0.3s, transform 0.1s, box-shadow 0.25s, opacity 0.3s;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 -4px 12px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.35);
}
.zone::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.25), transparent 60%);
  pointer-events: none;
}
.zone::after {
  content: '';
  position: absolute;
  inset: 0;
  background: white;
  opacity: 0;
  transition: opacity 0.08s;
  border-radius: inherit;
}
.zone:active { transform: scale(0.97); }
.zone.flash::after { opacity: 0.45; }
.zone.inactive {
  filter: grayscale(1) brightness(0.35);
  pointer-events: none;
}

.zone-name {
  font-weight: 900;
  font-size: clamp(12px, 2.6vw, 18px);
  color: rgba(255,255,255,0.95);
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 0 2px 6px rgba(0,0,0,0.35);
  z-index: 1;
  max-width: 95%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.zone-symbols {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 110px;
  z-index: 1;
}
.sym {
  font-size: clamp(14px, 3vw, 22px);
  opacity: 0.3;
  transition: opacity 0.25s, transform 0.25s;
  filter: grayscale(0.6);
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.sym.collected {
  opacity: 1;
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
  color: white !important;
}
.sym.pop { animation: symPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes symPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.9) rotate(-12deg); }
  70%  { transform: scale(0.9) rotate(4deg); }
  100% { transform: scale(1); }
}
.sym.lose { animation: symLose 0.5s ease-out forwards; }
@keyframes symLose {
  0%   { transform: scale(1); opacity: 1; }
  30%  { transform: scale(1.5) rotate(15deg); filter: brightness(2.5); }
  100% { transform: scale(0.8) rotate(-8deg); opacity: 0.3; filter: grayscale(0.6); }
}

@keyframes shake {
  0%,100% { transform: scale(1) rotate(0deg); }
  15%  { transform: scale(0.92) rotate(-4deg); }
  30%  { transform: scale(0.92) rotate(4deg); }
  45%  { transform: scale(0.95) rotate(-3deg); }
  60%  { transform: scale(0.95) rotate(3deg); }
  80%  { transform: scale(0.98) rotate(-1deg); }
}
.zone.shaking {
  animation: shake 0.45s ease-out;
  filter: saturate(0.3) brightness(0.8);
}

/* Floating score text */
.float-text {
  position: fixed;
  font-weight: 900;
  font-size: clamp(1.8em, 6vw, 2.6em);
  pointer-events: none;
  z-index: 400;
  transform: translateX(-50%);
  animation: floatUp 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
  text-shadow: 0 3px 10px rgba(0,0,0,0.6);
  white-space: nowrap;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(0.6); }
  20%  { opacity: 1; transform: translateX(-50%) translateY(-14px) scale(1.3); }
  70%  { opacity: 0.9; transform: translateX(-50%) translateY(-60px) scale(1); }
  100% { opacity: 0;   transform: translateX(-50%) translateY(-95px) scale(0.8); }
}

/* Zone colors */
.zone-rosa  { background: linear-gradient(155deg, #f8a5c2 0%, #f06292 45%, #ad1457 100%); grid-column: 2; grid-row: 1; }
.zone-blau  { background: linear-gradient(155deg, #90caf9 0%, #42a5f5 45%, #0d47a1 100%); grid-column: 2; grid-row: 3; }
.zone-pink  { background: linear-gradient(155deg, #f48fb1 0%, #e91e63 45%, #6a0937 100%); grid-column: 1; grid-row: 2; }
.zone-gruen { background: linear-gradient(155deg, #a5d6a7 0%, #66bb6a 45%, #1b5e20 100%); grid-column: 3; grid-row: 2; }

.zone-pink  .zone-name,
.zone-gruen .zone-name { writing-mode: vertical-rl; max-height: 95%; }
.zone-pink  .zone-name { transform: rotate(180deg); }
.zone-pink  .zone-symbols,
.zone-gruen .zone-symbols {
  flex-direction: column;
  max-width: none;
  max-height: 130px;
}

/* ── Center arena ── */
.arena {
  grid-column: 2;
  grid-row: 2;
  background:
    radial-gradient(circle at 50% 45%, #232a52 0%, #161b38 55%, #10142a 100%);
  border-radius: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.5), 0 4px 20px rgba(0,0,0,0.4);
}

.bubble {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.10;
  animation: bubbleFloat linear infinite;
}
@keyframes bubbleFloat {
  0%   { transform: translateY(105%) scale(0.6); opacity: 0; }
  15%  { opacity: 0.12; }
  85%  { opacity: 0.12; }
  100% { transform: translateY(-140%) scale(1.1); opacity: 0; }
}

/* Dot */
#dot {
  width: clamp(80px, 16vw, 130px);
  height: clamp(80px, 16vw, 130px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(32px, 7vw, 54px);
  position: absolute;
  pointer-events: none;
  color: white;
  z-index: 2;
}
#dot.showing { animation: dotAppear 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards, dotWobble 1.1s 0.4s ease-in-out infinite; }
#dot.blitz::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 4px dashed #ffd740;
  animation: blitzSpin 1.6s linear infinite;
}
#dot.steal::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 4px solid #ce93d8;
  animation: stealPulse 0.7s ease-in-out infinite;
}
@keyframes blitzSpin { to { transform: rotate(360deg); } }
@keyframes stealPulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%     { transform: scale(1.12); opacity: 0.5; }
}

@keyframes dotAppear {
  0%   { transform: scale(0) rotate(-40deg); opacity: 0; }
  55%  { transform: scale(1.2) rotate(6deg); opacity: 1; }
  75%  { transform: scale(0.92); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes dotWobble {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.06) rotate(-3deg); }
  50% { transform: scale(0.97) rotate(0deg); }
  75% { transform: scale(1.06) rotate(3deg); }
}
#dot.vanish  { animation: dotVanish 0.3s ease-in forwards; }
@keyframes dotVanish {
  0%   { transform: scale(1); opacity: 1; }
  30%  { transform: scale(1.1); }
  100% { transform: scale(0) rotate(30deg); opacity: 0; }
}
#dot.collect { animation: dotCollect 0.35s ease-out forwards; }
@keyframes dotCollect {
  0%   { transform: scale(1); opacity: 1; }
  40%  { transform: scale(1.7); opacity: 0.8; filter: brightness(1.8); }
  100% { transform: scale(0); opacity: 0; }
}

#timer-ring { position: absolute; border-radius: 50%; pointer-events: none; z-index: 1; }

.particle {
  position: fixed;
  width: 12px; height: 12px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 350;
  animation: particleFly 0.7s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
}
@keyframes particleFly {
  0%   { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
}

#speed-label {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(10px, 2vw, 13px);
  font-weight: 800;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  z-index: 1;
  transition: color 0.4s;
}
#speed-label.hot { color: #ffd740; animation: speedPulse 0.7s ease-in-out infinite; }
@keyframes speedPulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }

/* Mute button */
#btn-mute {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 550;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.8);
  font-size: 20px;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
#btn-mute:active { background: rgba(255,255,255,0.25); }
#btn-mute.muted { color: rgba(255,255,255,0.3); text-decoration: line-through; }

/* ── Overlays ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(8, 8, 28, 0.94);
  backdrop-filter: blur(6px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 500;
  color: white;
  text-align: center;
  gap: 18px;
  padding: 20px;
  overflow-y: auto;
}
.overlay h1 {
  font-size: clamp(2em, 8vw, 3.4em);
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #f48fb1, #42a5f5, #66bb6a, #f48fb1);
  background-size: 300% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: titleShimmer 4s linear infinite;
}
@keyframes titleShimmer { to { background-position: 300% center; } }

.overlay p {
  font-size: clamp(0.92em, 3vw, 1.15em);
  line-height: 1.7;
  opacity: 0.92;
}
.hint-blitz { color: #ffd740; font-weight: 800; }
.hint-steal { color: #ce93d8; font-weight: 800; }

/* Player count selector */
.count-row { display: flex; gap: 12px; }
.count-btn {
  width: 58px; height: 58px;
  border-radius: 16px;
  border: 3px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  font-family: inherit;
  font-size: 1.5em;
  font-weight: 900;
  cursor: pointer;
  transition: all 0.15s;
}
.count-btn.selected {
  border-color: #42a5f5;
  background: rgba(66,165,245,0.25);
  box-shadow: 0 0 16px rgba(66,165,245,0.4);
  transform: scale(1.08);
}

/* Name inputs */
.names-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: min(320px, 85vw);
}
.name-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.name-chip {
  width: 34px; height: 34px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 900;
  font-size: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.name-row input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 50px;
  border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: white;
  font-family: inherit;
  font-weight: 800;
  font-size: 15px;
  outline: none;
  min-width: 0;
}
.name-row input:focus { border-color: rgba(255,255,255,0.5); }
.name-row.disabled { opacity: 0.25; pointer-events: none; }

/* Streaks */
#streaks {
  font-size: clamp(0.85em, 2.6vw, 1em);
  color: rgba(255,255,255,0.6);
  font-weight: 800;
}

.btn {
  padding: 16px 50px;
  font-size: clamp(1.1em, 4vw, 1.4em);
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, #f48fb1 0%, #42a5f5 50%, #66bb6a 100%);
  color: white;
  cursor: pointer;
  font-family: inherit;
  font-weight: 900;
  box-shadow: 0 8px 32px rgba(66,165,245,0.35), 0 4px 16px rgba(0,0,0,0.4);
  transition: transform 0.1s, box-shadow 0.1s;
  letter-spacing: 1px;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: scale(0.94); box-shadow: 0 2px 12px rgba(0,0,0,0.4); }

/* Countdown */
#overlay-count { background: rgba(8, 8, 28, 0.75); display: none; }
#count-num {
  font-size: clamp(6em, 25vw, 12em);
  font-weight: 900;
  line-height: 1;
}
#count-num.zoom { animation: countZoom 0.9s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes countZoom {
  0%   { transform: scale(0.2); opacity: 0; }
  30%  { transform: scale(1.25); opacity: 1; }
  60%  { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.9); opacity: 0; }
}

/* Win screen */
#win-star {
  font-size: clamp(4em, 15vw, 7em);
  line-height: 1;
  animation: starSpin 1.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes starSpin {
  0%   { transform: scale(0) rotate(-360deg); }
  70%  { transform: scale(1.3) rotate(10deg); }
  100% { transform: scale(1) rotate(0deg); }
}
#win-scores {
  display: flex;
  flex-direction: column;
  gap: 10px;
  font-size: clamp(1.05em, 3.4vw, 1.35em);
  font-weight: 800;
  width: min(340px, 88vw);
}
.score-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 8px 26px;
  border-radius: 50px;
  background: rgba(255,255,255,0.07);
}
.score-row .rank { opacity: 0.6; min-width: 1.4em; }
.score-row.first {
  background: linear-gradient(90deg, rgba(255,215,64,0.25), rgba(255,215,64,0.08));
  box-shadow: 0 0 20px rgba(255,215,64,0.25);
}

/* Confetti */
.confetti-piece {
  position: fixed;
  opacity: 0;
  pointer-events: none;
  z-index: 600;
  animation: confettiFall ease-in forwards;
}
@keyframes confettiFall {
  0%   { opacity: 1; transform: translateY(-30px) rotate(0deg) translateX(0); }
  25%  { transform: translateY(25vh) rotate(180deg) translateX(20px); }
  50%  { transform: translateY(50vh) rotate(360deg) translateX(-20px); }
  75%  { transform: translateY(75vh) rotate(540deg) translateX(15px); }
  100% { opacity: 0.6; transform: translateY(105vh) rotate(720deg) translateX(-10px); }
}

@keyframes zonePulse {
  0%, 100% { filter: brightness(1); }
  50%      { filter: brightness(1.6) saturate(1.4); }
}
.zone.winning { animation: zonePulse 0.5s infinite; }
</style>
</head>
<body>

<div class="zone zone-rosa" id="zone-rosa">
  <div class="zone-name" id="name-rosa">Rosa</div>
  <div class="zone-symbols" id="sym-rosa"></div>
</div>

<div class="zone zone-pink" id="zone-pink">
  <div class="zone-name" id="name-pink">Pink</div>
  <div class="zone-symbols" id="sym-pink"></div>
</div>

<div class="arena" id="arena">
  <canvas id="timer-ring"></canvas>
  <div id="dot"></div>
  <div id="speed-label">Tempo 1</div>
</div>

<div class="zone zone-gruen" id="zone-gruen">
  <div class="zone-name" id="name-gruen">Grün</div>
  <div class="zone-symbols" id="sym-gruen"></div>
</div>

<div class="zone zone-blau" id="zone-blau">
  <div class="zone-name" id="name-blau">Blau</div>
  <div class="zone-symbols" id="sym-blau"></div>
</div>

<button id="btn-mute" title="Ton an/aus">♪</button>

<!-- Start screen -->
<div class="overlay" id="overlay-start">
  <h1>Farbpunkte</h1>

  <p style="font-weight:800">Wie viele Spieler?</p>
  <div class="count-row">
    <button class="count-btn" data-count="2">2</button>
    <button class="count-btn" data-count="3">3</button>
    <button class="count-btn selected" data-count="4">4</button>
  </div>

  <div class="names-grid" id="names-grid"></div>

  <p style="opacity:0.75; font-size:0.9em">
    Deine Farbe erscheint = schnell tippen! Falsch = 1 Punkt weg.<br>
    <span class="hint-blitz">Gold-Punkt = 2 Punkte</span> ·
    <span class="hint-steal">Lila ◆ = wer zuerst tippt, klaut dem Ersten 1 Punkt</span>
  </p>

  <div id="streaks"></div>

  <button class="btn" id="btn-start">Los geht's!</button>
</div>

<!-- Countdown -->
<div class="overlay" id="overlay-count">
  <div id="count-num"></div>
</div>

<!-- Win screen -->
<div class="overlay" id="overlay-win" style="display:none">
  <div id="win-star">★</div>
  <h1 id="win-title" style="background:none; -webkit-text-fill-color:currentColor;"></h1>
  <div id="win-scores"></div>
  <button class="btn" id="btn-again">Nochmal spielen!</button>
</div>

<script>
const PLAYERS = {
  rosa:  { color: '#f06292', bg: 'linear-gradient(155deg,#f8a5c2,#f06292 45%,#ad1457)', label: 'Rosa',  emoji: '○', score: 0 },
  pink:  { color: '#e91e63', bg: 'linear-gradient(155deg,#f48fb1,#e91e63 45%,#6a0937)', label: 'Pink',  emoji: '♥', score: 0 },
  blau:  { color: '#42a5f5', bg: 'linear-gradient(155deg,#90caf9,#42a5f5 45%,#0d47a1)', label: 'Blau',  emoji: '≈', score: 0 },
  gruen: { color: '#66bb6a', bg: 'linear-gradient(155deg,#a5d6a7,#66bb6a 45%,#1b5e20)', label: 'Grün',  emoji: '▌', score: 0 },
};
// Zone activation order per player count: 2 = top/bottom, 3 = +left, 4 = all
const COUNT_ZONES = {
  2: ['rosa', 'blau'],
  3: ['rosa', 'blau', 'pink'],
  4: ['rosa', 'blau', 'pink', 'gruen'],
};
const MAX = 5;
const BASE_DOT_MS = 2600;
const MIN_DOT_MS = 1300;
const BLITZ_CHANCE = 0.14;
const STEAL_CHANCE = 0.10;

let playerCount = parseInt(localStorage.getItem('fp_count') || '4');
let activeKeys = COUNT_ZONES[playerCount];
let names = JSON.parse(localStorage.getItem('fp_names') || '{}');
let wins  = JSON.parse(localStorage.getItem('fp_wins')  || '{}');
let muted = localStorage.getItem('fp_muted') === '1';

let current = null;      // player key, or '__steal__'
let isBlitz = false;
let dotMs = BASE_DOT_MS;
let dotTimer = null;
let timerStart = null;
let rafId = null;
let active = false;
let tapLocked = false;
let lastTickSecond = -1;

function displayName(key) {
  return (names[key] || '').trim() || PLAYERS[key].label;
}

// ── Audio ─────────────────────────────────────────────────────
const actx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, dur, type = 'sine', vol = 0.3, delay = 0) {
  if (muted) return;
  try {
    const t = actx.currentTime + delay;
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(_) {}
}

function soundCollect()  { beep(784,0.12); beep(988,0.12,'sine',0.3,0.07); beep(1319,0.2,'sine',0.3,0.14); }
function soundBlitz()    { beep(880,0.1); beep(1109,0.1,'sine',0.3,0.06); beep(1319,0.1,'sine',0.3,0.12); beep(1760,0.25,'sine',0.35,0.18); }
function soundSteal()    { beep(659,0.09,'triangle',0.3); beep(554,0.09,'triangle',0.3,0.08); beep(880,0.22,'triangle',0.32,0.16); }
function soundMiss()     { beep(220, 0.3, 'sawtooth', 0.18); beep(165, 0.35, 'sawtooth', 0.15, 0.12); }
function soundPenalty()  { beep(280, 0.12, 'sawtooth', 0.25); beep(180, 0.28, 'sawtooth', 0.22, 0.1); }
function soundTick()     { beep(1200, 0.04, 'square', 0.08); }
function soundCount(n)   { beep(n === 0 ? 880 : 440, n === 0 ? 0.4 : 0.15, 'sine', 0.35); }
function soundWin() {
  [523,659,784,1047,1319,1568].forEach((f,i) => beep(f, 0.22, 'sine', 0.3, i * 0.11));
}

// ── Haptics ───────────────────────────────────────────────────
function vibrate(pattern) {
  if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch(_) {} }
}

// ── Mute ──────────────────────────────────────────────────────
const muteBtn = document.getElementById('btn-mute');
function renderMute() { muteBtn.classList.toggle('muted', muted); }
muteBtn.addEventListener('click', () => {
  muted = !muted;
  localStorage.setItem('fp_muted', muted ? '1' : '0');
  renderMute();
});
renderMute();

// ── Start screen: player count + names ────────────────────────
function renderCountButtons() {
  document.querySelectorAll('.count-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.count) === playerCount);
  });
}
document.querySelectorAll('.count-btn').forEach(b => {
  b.addEventListener('click', () => {
    playerCount = parseInt(b.dataset.count);
    activeKeys = COUNT_ZONES[playerCount];
    localStorage.setItem('fp_count', String(playerCount));
    renderCountButtons();
    renderNameInputs();
    applyZoneActivation();
  });
});

function renderNameInputs() {
  const grid = document.getElementById('names-grid');
  grid.innerHTML = '';
  for (const key of COUNT_ZONES[4]) {
    const p = PLAYERS[key];
    const isActive = activeKeys.includes(key);
    const row = document.createElement('div');
    row.className = 'name-row' + (isActive ? '' : ' disabled');
    row.innerHTML = `
      <span class="name-chip" style="background:${p.bg}">${p.emoji}</span>
      <input type="text" maxlength="12" placeholder="${p.label}" value="${(names[key] || '').replace(/"/g,'')}" data-key="${key}">
    `;
    grid.appendChild(row);
  }
  grid.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', () => {
      names[inp.dataset.key] = inp.value;
      localStorage.setItem('fp_names', JSON.stringify(names));
    });
  });
}

function renderStreaks() {
  const entries = Object.entries(wins).filter(([,n]) => n > 0).sort((a,b) => b[1]-a[1]);
  document.getElementById('streaks').textContent = entries.length
    ? 'Siege: ' + entries.map(([n,c]) => `${n} ${c}×`).join(' · ')
    : '';
}

function applyZoneActivation() {
  for (const key of COUNT_ZONES[4]) {
    const zone = document.getElementById('zone-' + key);
    zone.classList.toggle('inactive', !activeKeys.includes(key));
    document.getElementById('name-' + key).textContent = displayName(key);
  }
}

// ── Score UI ──────────────────────────────────────────────────
function buildScores() {
  for (const key of activeKeys) {
    const p = PLAYERS[key];
    p.score = 0;
    const el = document.getElementById('sym-' + key);
    el.innerHTML = '';
    for (let i = 0; i < MAX; i++) {
      const s = document.createElement('span');
      s.className = 'sym';
      s.id = `s-${key}-${i}`;
      s.textContent = p.emoji;
      s.style.color = p.color;
      el.appendChild(s);
    }
  }
  updateSpeed();
}

function markCollected(key, idx) {
  const s = document.getElementById(`s-${key}-${idx}`);
  if (!s) return;
  s.classList.add('collected', 'pop');
  s.addEventListener('animationend', ()=>s.classList.remove('pop'), {once:true});
}

function markUncollected(key, idx) {
  const s = document.getElementById(`s-${key}-${idx}`);
  if (!s) return;
  s.classList.add('lose');
  s.addEventListener('animationend', () => s.classList.remove('collected', 'lose'), {once:true});
}

function showFloatText(zone, text, color) {
  const rect = zone.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.color = color;
  el.style.left = (rect.left + rect.width / 2) + 'px';
  el.style.top  = (rect.top  + rect.height / 2) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), {once:true});
}

function shakeZone(zone) {
  zone.classList.remove('shaking');
  void zone.offsetWidth;
  zone.classList.add('shaking');
  zone.addEventListener('animationend', () => zone.classList.remove('shaking'), {once:true});
}

function screenShake() {
  document.body.classList.remove('screen-shake');
  void document.body.offsetWidth;
  document.body.classList.add('screen-shake');
  document.body.addEventListener('animationend', () => document.body.classList.remove('screen-shake'), {once:true});
}

// ── Particles ─────────────────────────────────────────────────
function burstParticles(x, y, color, count = 14) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const dist = 60 + Math.random() * 90;
    el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.style.background = color;
    el.style.width = el.style.height = (8 + Math.random() * 8) + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove(), {once:true});
  }
}

// ── Speed ramp ────────────────────────────────────────────────
function updateSpeed() {
  const top = Math.max(0, ...activeKeys.map(k => PLAYERS[k].score));
  dotMs = BASE_DOT_MS - (BASE_DOT_MS - MIN_DOT_MS) * (top / (MAX - 1));
  dotMs = Math.max(MIN_DOT_MS, dotMs);
  const level = 1 + Math.round((1 - (dotMs - MIN_DOT_MS) / (BASE_DOT_MS - MIN_DOT_MS)) * 4);
  const label = document.getElementById('speed-label');
  label.textContent = 'Tempo ' + level;
  label.classList.toggle('hot', level >= 4);
}

// ── Timer ring ────────────────────────────────────────────────
const canvas = document.getElementById('timer-ring');
const c = canvas.getContext('2d');
const dotEl = document.getElementById('dot');

function resizeCanvas() {
  const dotSize = dotEl.offsetWidth || 110;
  const R = dotSize * 0.78;
  canvas.width  = R * 2 + 24;
  canvas.height = R * 2 + 24;
  canvas.style.width  = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
  canvas._R = R;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function ringColor() {
  if (current === '__steal__') return '#ce93d8';
  return current ? PLAYERS[current].color : '#ffffff';
}

function drawRing(progress, color) {
  const R = canvas._R || 60;
  const cx = canvas.width / 2, cy = canvas.height / 2;
  c.clearRect(0, 0, canvas.width, canvas.height);
  c.beginPath();
  c.arc(cx, cy, R, 0, Math.PI * 2);
  c.strokeStyle = 'rgba(255,255,255,0.1)';
  c.lineWidth = 7;
  c.stroke();
  if (progress > 0) {
    c.beginPath();
    c.arc(cx, cy, R, -Math.PI/2, -Math.PI/2 + (1 - progress) * Math.PI * 2, false);
    c.strokeStyle = progress < 0.3 ? '#ff5252' : color;
    c.lineWidth = 7;
    c.lineCap = 'round';
    c.stroke();
  }
}

function animateRing() {
  if (!timerStart || !current) return;
  const elapsed = Date.now() - timerStart;
  const progress = Math.max(0, 1 - elapsed / dotMs);
  drawRing(progress, ringColor());
  if (progress < 0.3 && progress > 0) {
    const tickPhase = Math.floor(elapsed / 180);
    if (tickPhase !== lastTickSecond) { lastTickSecond = tickPhase; soundTick(); }
  }
  if (progress > 0) rafId = requestAnimationFrame(animateRing);
  else c.clearRect(0, 0, canvas.width, canvas.height);
}

// ── Dot ───────────────────────────────────────────────────────
function pickPlayer() {
  const weights = activeKeys.map(k => MAX - PLAYERS[k].score + 1);
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random() * total;
  for (let i = 0; i < activeKeys.length; i++) {
    r -= weights[i];
    if (r <= 0) return activeKeys[i];
  }
  return activeKeys[activeKeys.length - 1];
}

function anyoneHasPoints() {
  return activeKeys.some(k => PLAYERS[k].score > 0);
}

function showDot() {
  if (!active) return;
  tapLocked = false;
  lastTickSecond = -1;

  // Steal dot only makes sense if someone has a point to steal
  if (Math.random() < STEAL_CHANCE && anyoneHasPoints()) {
    current = '__steal__';
    isBlitz = false;
    dotEl.className = 'showing steal';
    dotEl.style.background = 'linear-gradient(155deg,#e1bee7,#ab47bc 45%,#4a148c)';
    dotEl.style.boxShadow = '0 0 50px #ce93d8cc, 0 0 100px #ab47bc66';
    dotEl.textContent = '◆';
  } else {
    current = pickPlayer();
    isBlitz = Math.random() < BLITZ_CHANCE;
    const p = PLAYERS[current];
    dotEl.className = 'showing' + (isBlitz ? ' blitz' : '');
    dotEl.style.background = p.bg;
    dotEl.style.boxShadow = isBlitz
      ? `0 0 50px #ffd740cc, 0 0 100px ${p.color}66`
      : `0 0 45px ${p.color}99, 0 0 90px ${p.color}44`;
    dotEl.textContent = p.emoji;
  }
  resizeCanvas();

  timerStart = Date.now();
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(animateRing);
  dotTimer = setTimeout(missedDot, dotMs);
}

function clearDot() {
  dotEl.className = '';
  dotEl.textContent = '';
  dotEl.style.background = '';
  dotEl.style.boxShadow = '';
}

function missedDot() {
  cancelAnimationFrame(rafId);
  c.clearRect(0, 0, canvas.width, canvas.height);
  dotEl.className = 'vanish';
  soundMiss();
  current = null;
  isBlitz = false;
  tapLocked = true;
  setTimeout(() => { clearDot(); scheduleNext(); }, 320);
}

function scheduleNext() {
  const delay = 500 + Math.random() * 800;
  setTimeout(showDot, delay);
}

// ── Steal resolution ──────────────────────────────────────────
function resolveSteal(taker) {
  // Steal 1 point from the highest-scoring OTHER player
  const victims = activeKeys
    .filter(k => k !== taker && PLAYERS[k].score > 0)
    .sort((a, b) => PLAYERS[b].score - PLAYERS[a].score);
  const takerZone = document.getElementById('zone-' + taker);
  const tp = PLAYERS[taker];

  if (!victims.length) {
    // Nobody to steal from — consolation +1 if not maxed
    if (tp.score < MAX) { markCollected(taker, tp.score); tp.score++; }
    showFloatText(takerZone, '+1', '#ce93d8');
  } else {
    const victim = victims[0];
    const vp = PLAYERS[victim];
    vp.score--;
    markUncollected(victim, vp.score);
    const victimZone = document.getElementById('zone-' + victim);
    shakeZone(victimZone);
    showFloatText(victimZone, '−1', '#ce93d8');
    if (tp.score < MAX) { markCollected(taker, tp.score); tp.score++; }
    showFloatText(takerZone, '+1 geklaut!', '#ce93d8');
  }
  soundSteal();
  vibrate(40);
  updateSpeed();

  if (tp.score >= MAX) {
    setTimeout(() => endGame(taker), 400);
  } else {
    setTimeout(() => { clearDot(); scheduleNext(); }, 350);
  }
}

// ── Tap handling ──────────────────────────────────────────────
function tap(color) {
  if (!active || tapLocked || !activeKeys.includes(color)) return;
  actx.resume();

  const zone = document.getElementById('zone-' + color);

  if (!current) {
    flashZone(zone);
    return;
  }

  // Steal dot: first tapper wins it, no penalties
  if (current === '__steal__') {
    clearTimeout(dotTimer);
    cancelAnimationFrame(rafId);
    c.clearRect(0, 0, canvas.width, canvas.height);
    tapLocked = true;
    current = null;

    flashZone(zone);
    const dotRect = dotEl.getBoundingClientRect();
    burstParticles(dotRect.left + dotRect.width/2, dotRect.top + dotRect.height/2, '#ce93d8', 18);
    dotEl.className = 'collect';
    resolveSteal(color);
    return;
  }

  if (color === current) {
    clearTimeout(dotTimer);
    cancelAnimationFrame(rafId);
    c.clearRect(0, 0, canvas.width, canvas.height);
    tapLocked = true;

    const gained = isBlitz ? 2 : 1;
    const p = PLAYERS[color];

    flashZone(zone);
    showFloatText(zone, '+' + gained, isBlitz ? '#ffd740' : '#ffffff');
    vibrate(isBlitz ? [30, 40, 30] : 30);

    const dotRect = dotEl.getBoundingClientRect();
    burstParticles(dotRect.left + dotRect.width/2, dotRect.top + dotRect.height/2,
                   isBlitz ? '#ffd740' : p.color, isBlitz ? 22 : 14);

    dotEl.className = 'collect';
    isBlitz ? soundBlitz() : soundCollect();

    for (let i = 0; i < gained && p.score < MAX; i++) {
      markCollected(color, p.score);
      p.score++;
    }
    current = null;
    isBlitz = false;
    updateSpeed();

    if (p.score >= MAX) {
      setTimeout(() => endGame(color), 400);
    } else {
      setTimeout(() => { clearDot(); scheduleNext(); }, 350);
    }
  } else {
    const p = PLAYERS[color];
    if (p.score > 0) {
      p.score--;
      markUncollected(color, p.score);
      updateSpeed();
    }
    shakeZone(zone);
    screenShake();
    showFloatText(zone, '−1', '#ff5252');
    soundPenalty();
    vibrate([60, 40, 60]);
  }
}

function flashZone(zone) {
  zone.classList.add('flash');
  setTimeout(() => zone.classList.remove('flash'), 200);
}

for (const key of COUNT_ZONES[4]) {
  document.getElementById('zone-' + key).addEventListener('pointerdown', () => tap(key));
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const map = { w:'rosa', a:'pink', s:'blau', d:'gruen' };
  const k = map[e.key.toLowerCase()];
  if (k) tap(k);
});

// ── Ambient bubbles ───────────────────────────────────────────
function spawnBubbles() {
  const arena = document.getElementById('arena');
  const colors = ['#f06292','#42a5f5','#66bb6a','#e91e63','#ffd740'];
  for (let i = 0; i < 10; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 20 + Math.random() * 60;
    b.style.width = b.style.height = size + 'px';
    b.style.left = Math.random() * 95 + '%';
    b.style.background = colors[i % colors.length];
    b.style.animationDuration = (7 + Math.random() * 9) + 's';
    b.style.animationDelay = (Math.random() * -14) + 's';
    arena.appendChild(b);
  }
}
spawnBubbles();

// ── Game lifecycle ────────────────────────────────────────────
function startGame() {
  document.getElementById('overlay-start').style.display = 'none';
  document.getElementById('overlay-win').style.display = 'none';
  for (const key of COUNT_ZONES[4]) {
    document.getElementById('zone-' + key).classList.remove('winning');
  }
  applyZoneActivation();
  buildScores();
  runCountdown();
}

function runCountdown() {
  const overlay = document.getElementById('overlay-count');
  const num = document.getElementById('count-num');
  overlay.style.display = 'flex';
  const steps = ['3', '2', '1', 'LOS!'];
  const colors = ['#f06292', '#42a5f5', '#66bb6a', '#ffd740'];

  let i = 0;
  function step() {
    if (i >= steps.length) {
      overlay.style.display = 'none';
      active = true;
      tapLocked = false;
      scheduleNext();
      return;
    }
    num.textContent = steps[i];
    num.style.color = colors[i];
    num.classList.remove('zoom');
    void num.offsetWidth;
    num.classList.add('zoom');
    soundCount(i === steps.length - 1 ? 0 : i + 1);
    i++;
    setTimeout(step, 850);
  }
  step();
}

function endGame(winner) {
  active = false;
  clearTimeout(dotTimer);
  cancelAnimationFrame(rafId);
  c.clearRect(0, 0, canvas.width, canvas.height);
  clearDot();
  soundWin();
  vibrate([80, 50, 80, 50, 150]);
  spawnConfetti();

  const p = PLAYERS[winner];
  const wName = displayName(winner);
  document.getElementById('zone-' + winner).classList.add('winning');

  // Persist win streak by name
  wins[wName] = (wins[wName] || 0) + 1;
  localStorage.setItem('fp_wins', JSON.stringify(wins));
  renderStreaks();

  document.getElementById('win-star').style.color = p.color;
  document.getElementById('win-title').textContent = wName + ' gewinnt!';
  document.getElementById('win-title').style.color = p.color;

  const rows = activeKeys
    .map(k => PLAYERS[k])
    .sort((a,b) => b.score - a.score)
    .map((pl, i) => {
      const key = Object.keys(PLAYERS).find(k => PLAYERS[k] === pl);
      return `<div class="score-row ${i === 0 ? 'first' : ''}">
         <span class="rank">${i+1}.</span>
         <span style="color:${pl.color}">${pl.emoji}</span>
         <span>${displayName(key)}</span>
         <span style="margin-left:auto; color:${pl.color}">${pl.score} ${pl.score === 1 ? 'Punkt' : 'Punkte'}</span>
       </div>`;
    }).join('');
  document.getElementById('win-scores').innerHTML = rows;

  setTimeout(() => {
    document.getElementById('overlay-win').style.display = 'flex';
  }, 700);
}

document.getElementById('btn-start').addEventListener('click', () => { actx.resume(); startGame(); });
document.getElementById('btn-again').addEventListener('click', () => { actx.resume(); startGame(); });

// ── Confetti ──────────────────────────────────────────────────
function spawnConfetti() {
  const colors = ['#f48fb1','#42a5f5','#66bb6a','#f06292','#ffd740','#ff9800','#ab47bc'];
  for (let i = 0; i < 90; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const w = 6 + Math.random() * 8;
      el.style.width = w + 'px';
      el.style.height = (w * (0.8 + Math.random())) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-30px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.6 + Math.random() * 1.4) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove(), {once:true});
    }, Math.random() * 1200);
  }
}

// ── Init ──────────────────────────────────────────────────────
renderCountButtons();
renderNameInputs();
renderStreaks();
applyZoneActivation();
</script>
